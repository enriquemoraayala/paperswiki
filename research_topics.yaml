  - name: "Causal Reinforcement Learning"
    keywords:
      - "causal reinforcement learning"
      - "causal policy"
      - "causal reward"
      - "causal world model"
    arxiv_categories:
      - "cs.LG"
      - "cs.AI"
    max_results: 15
    abstract_filter: >
      The paper must explicitly combine causal reasoning with reinforcement learning,
      for example causal world models, causal policy learning, causal credit assignment,
      or using interventions/counterfactuals to improve RL agents.
