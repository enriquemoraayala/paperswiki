# Research Topics Configuration
#
# This file defines the scientific topics the agent will scan for on arXiv.
# Edit this file to change the scope of the research without touching any code.
#
# Schema:
#   topics:
#     - name: <human-readable topic name>
#       keywords:          # list of keywords used in full-text search
#         - "<keyword>"
#       arxiv_categories:  # optional arXiv category codes (e.g. cs.AI, stat.ML)
#         - "<category>"
#       max_results: <int> # max papers to fetch per topic per run (default: 20)
#       abstract_filter: "<natural language criterion>"
#         # Used ONLY when running with --advanced-filter.
#         # The LLM will classify each paper abstract against this criterion
#         # and discard papers that do not match.

topics:
  - name: "Causal AI"
    keywords:
      - "causal artificial intelligence"
      - "causal machine learning"
      - "causal representation learning"
      - "causal generative model"
    arxiv_categories:
      - "cs.AI"
      - "cs.LG"
    max_results: 20
    abstract_filter: >
      The paper must be primarily about causal AI or causal machine learning methods,
      including causal representation learning, or causal generative models.
      Papers that merely mention causality in passing are NOT relevant.

